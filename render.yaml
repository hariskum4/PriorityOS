# Render Blueprint — one-click API host for Priority.
# Render runs a persistent process, so the @nestjs/schedule cron jobs work.
# In the Render dashboard: New → Blueprint → point at this repo.
# Set the secret env vars (marked sync:false) in the dashboard after creation.
services:
  - type: web
    name: priority-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # Supabase PriorityOS (project ref: zmtvybuikfjmjpvaqduq, region ap-south-1).
      # BOTH use the IPv4 pooler (aws-1) — the direct db.<ref>.supabase.co host is
      # IPv6-only and unreachable from Render. Same username + password on both;
      # only the port/mode differs (6543 transaction vs 5432 session). Fill [PW].
      - key: DATABASE_URL
        sync: false        # postgresql://postgres.zmtvybuikfjmjpvaqduq:[PW]@aws-1-ap-south-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      - key: DIRECT_URL
        sync: false        # postgresql://postgres.zmtvybuikfjmjpvaqduq:[PW]@aws-1-ap-south-1.pooler.supabase.com:5432/postgres
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900s
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGINS
        value: https://priority-brown.vercel.app
      - key: AI_ENABLED
        value: "false"     # flip to "true" once you add AI_API_KEY
      - key: AI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: AI_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: AI_API_KEY
        sync: false
